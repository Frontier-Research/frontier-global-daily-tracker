name: Update market data

# Twice a day, tuned to Sri Lanka (UTC+5:30):
#   00:30 UTC  ≈ 06:00 SLT  — REPORT RUN. The US close (20:00-21:00 UTC) has settled
#                             and overnight crypto/FX/commodities are captured, so the
#                             board is ready ahead of a 07:00 SLT report.
#   13:00 UTC  ≈ 18:30 SLT  — SL evening: captures the day's crypto/FX/commodity drift.
# GitHub's scheduler can run a few minutes late; both slots have buffer to absorb it.
# Note: FRED's DGS10 (10Y yield) can publish a day late regardless of run time — that's
# a source lag, not a scheduling issue, and the board flags it as stale when it happens.
on:
  schedule:
    - cron: "30 0 * * *"
    - cron: "0 13 * * *"
  workflow_dispatch: {}   # allow a manual run from the Actions tab

# Least privilege: the job only needs to push data commits.
permissions:
  contents: write

# Never let two refreshes overlap and fight over the same files.
concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      # Vendor the front-end libraries once, so the site is fully self-hosted and
      # the Content-Security-Policy can stay 'self' only (no third-party script host).
      - name: Vendor front-end libraries (if missing)
        run: |
          mkdir -p assets/vendor
          if [ ! -f assets/vendor/echarts.min.js ]; then
            curl -fsSL https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js \
              -o assets/vendor/echarts.min.js
          fi
          if [ ! -f assets/vendor/xlsx.full.min.js ]; then
            curl -fsSL https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js \
              -o assets/vendor/xlsx.full.min.js
          fi

      - name: Fetch and update store
        env:
          # Optional: add a CoinGecko demo key as a repo secret to raise rate limits.
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
        run: python scripts/fetch.py

      - name: Commit changes
        run: |
          git config user.name  "frontier-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data assets/vendor
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "data: refresh $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
